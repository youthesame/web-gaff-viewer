<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAFF Viewer</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.4.2/3Dmol-min.js"></script>
</head>
<body>
<div id="app">
  <header id="app-header">
    <h1>GAFF Viewer</h1>
    <p class="subtitle">GAFF force field atom type / partial charge viewer</p>
  </header>

  <main id="main">
    <section id="viewer-pane">
      <div id="viewer-container">
        <div id="viewer"></div>
        <div id="dropzone-hint">mol2ファイルをここにドロップ</div>
      </div>
    </section>

    <aside id="side-panel">
      <div class="panel-section">
        <label class="panel-label" for="molecule-select">分子</label>
        <select id="molecule-select"></select>
        <label class="file-btn" for="file-input">
          ファイルを開く…
          <input type="file" id="file-input" accept=".mol2" hidden>
        </label>
      </div>

      <div class="panel-section">
        <span class="panel-label">表示モード</span>
        <div class="segmented" id="mode-segmented">
          <button type="button" class="segmented-btn active" data-mode="gaff">GAFFタイプ</button>
          <button type="button" class="segmented-btn" data-mode="charge">電荷</button>
        </div>
      </div>

      <div class="panel-section panel-row">
        <label class="toggle">
          <input type="checkbox" id="label-toggle" checked>
          <span>ラベル表示</span>
        </label>
      </div>

      <div class="panel-section" id="table-section">
        <span class="panel-label">原子情報</span>
        <div id="table-wrap">
          <table id="atom-table">
            <thead>
              <tr>
                <th>#</th>
                <th>原子名</th>
                <th>元素</th>
                <th>GAFF</th>
                <th>電荷</th>
              </tr>
            </thead>
            <tbody id="atom-table-body"></tbody>
          </table>
        </div>
      </div>
    </aside>
  </main>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
