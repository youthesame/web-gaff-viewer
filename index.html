<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAFF Viewer</title>
<link rel="stylesheet" href="style.css?v=7">
<script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.4.2/3Dmol-min.js"></script>
</head>
<body>
<div id="app">
  <header id="app-header">
    <h1>GAFF Viewer</h1>
  </header>

  <main id="main">
    <section id="viewer-pane">
      <div id="viewer-container">
        <div id="viewer"></div>
        <div id="empty-state">Drop a mol2 file here or open a file</div>
        <div id="dropzone-hint">Drop a mol2 file here</div>
      </div>
    </section>

    <aside id="side-panel">
      <div class="panel-section">
        <label class="panel-label" for="molecule-select">Molecule</label>
        <select id="molecule-select"></select>
        <div class="btn-row">
          <label class="file-btn" for="file-input">
            Open file…
            <input type="file" id="file-input" accept=".mol2" hidden>
          </label>
          <button type="button" class="file-btn" id="remove-btn">Remove</button>
        </div>
        <div id="mol-info" class="mol-info"></div>
      </div>

      <div class="panel-section">
        <span class="panel-label">Display mode</span>
        <div class="segmented" id="mode-segmented">
          <button type="button" class="segmented-btn active" data-mode="gaff">GAFF type</button>
          <button type="button" class="segmented-btn" data-mode="charge">Charge</button>
        </div>
      </div>

      <div class="panel-section panel-row">
        <label class="toggle">
          <input type="checkbox" id="label-toggle" checked>
          <span>Labels</span>
        </label>
      </div>

      <div class="panel-section">
        <details id="advanced">
          <summary>Advanced options</summary>
          <div class="adv-control">
            <label class="toggle">
              <input type="checkbox" id="bg-toggle">
              <span>White background</span>
            </label>
          </div>
          <div class="adv-control">
            <label class="panel-label" for="charge-size">Charge sphere size</label>
            <div class="slider-wrap">
              <input type="range" id="charge-size" min="0.3" max="2.5" step="0.1" value="1">
              <span class="slider-default" style="left: calc(8px + (100% - 16px) * 0.318)" title="default"></span>
            </div>
          </div>
          <div class="adv-control">
            <label class="panel-label" for="charge-alpha">Charge opacity</label>
            <div class="slider-wrap">
              <input type="range" id="charge-alpha" min="0.2" max="1" step="0.05" value="0.7">
              <span class="slider-default" style="left: calc(8px + (100% - 16px) * 0.625)" title="default"></span>
            </div>
          </div>
        </details>
      </div>

      <div class="panel-section" id="table-section">
        <span class="panel-label">Atoms</span>
        <div id="table-wrap">
          <table id="atom-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Element</th>
                <th>GAFF</th>
                <th>Charge</th>
              </tr>
            </thead>
            <tbody id="atom-table-body"></tbody>
          </table>
        </div>
      </div>
    </aside>
  </main>
</div>

<script type="module" src="js/app.js?v=7"></script>
</body>
</html>
